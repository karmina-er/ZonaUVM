<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Lince - UVM</title>
    
    <!-- Fuente Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --uvmRed: #E30613;
            --uvmDark: #0A0A0A;
            --uvmBorder: #333333;
            --uvmGray: #A0A0A0;
            --bg-color: #0A0A0A;
            --text-color: #FFFFFF;
            --card-bg: #1A1A1A;
            --border-color: #333333;
            --shadow-custom: 0 10px 40px rgba(0,0,0,0.5);
        }

        body.light-mode {
            --bg-color: #F3F4F6;
            --text-color: #111827;
            --card-bg: #FFFFFF;
            --border-color: #E5E7EB;
            --uvmBorder: #E5E7EB;
            --soft-gray: #4B5563;
            --shadow-custom: 0 10px 40px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Ajustes de Encabezado --- */
        .glass-header-nav {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--uvmBorder);
            width: 100%;
            padding: 0.75rem 1.5rem;
            z-index: 1000;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-button {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            padding: 8px 14px;
            border-radius: 8px;
            background: rgba(128, 128, 128, 0.1);
        }

        .back-button:hover {
            background: rgba(227, 6, 19, 0.1);
            color: var(--uvmRed);
            transform: translateX(-3px);
        }

        .header-logo-small {
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            color: var(--text-color);
            text-decoration: none;
        }

        .header-logo-small span {
            color: var(--uvmRed);
        }

        /* --- Componentes del Chat --- */
        .chat-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-custom);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .chat-header {
            background-color: var(--uvmRed);
        }

        .msg {
            animation: slide-in-from-right 0.3s ease-out forwards;
        }

        .msg-user {
            background-color: var(--uvmRed);
            color: #FFFFFF;
            border-bottom-right-radius: 4px;
        }

        .msg-bot {
            background-color: var(--border-color);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .chat-input:focus {
            border-color: var(--uvmRed);
            outline: none;
        }

        #theme-toggle {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        @keyframes slide-in-from-right {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>

    <!-- Header Nav Superior -->
    <header class="glass-header-nav">
        <div class="nav-container">
            <!-- Botón de Regreso -->
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i>
                <span class="hidden sm:inline">Volver</span>
            </a>

            <!-- Identidad de la Página -->
            <a href="#" class="header-logo-small">
                ZONA<span>UVM</span>
            </a>

            <!-- Controles: Theme + Perfil -->
            <div class="flex items-center gap-3 sm:gap-4">
                <button id="theme-toggle-nav" onclick="toggleTheme()" class="theme-toggle-nav shrink-0" title="Cambiar tema">
                    <i class="fa-solid fa-sun"></i>
                </button>
                <div class="shrink-0 flex items-center justify-center rounded-full cursor-pointer hover:scale-105 transition-transform shadow-md" style="width: 38px; height: 38px; background: var(--uvmRed);">
                    <i class="fas fa-user-graduate" style="font-size: 1.1rem; color: white;"></i>
                </div>
            </div>
        </div>
    </header>


    <main class="flex-1 flex items-center justify-center p-4 lg:p-6 overflow-hidden">
        <!-- Contenedor Principal del Chat -->
        <div class="chat-container w-full max-w-3xl h-full max-h-[800px] rounded-2xl flex flex-col overflow-hidden relative">
            
            <!-- Header del Chat -->
            <header class="chat-header p-5 flex items-center gap-4 shadow-md z-10 shrink-0">
                <div class="h-12 w-12 bg-white rounded-full flex items-center justify-center shrink-0 shadow-inner">
                    <span class="text-2xl">🐾</span>
                </div>
                <div>
                    <h1 class="text-white text-xl font-black uppercase tracking-tight m-0 leading-none">
                        Asistente Lince
                    </h1>
                    <p class="text-white/80 text-xs font-medium tracking-wide mt-1 uppercase">
                        UVM Campus Gdl Sur • En línea
                    </p>
                </div>
            </header>

            <!-- Área de Mensajes -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 lg:p-6 flex flex-col gap-4">
                <div class="msg msg-bot self-start max-w-[85%] lg:max-w-[75%] p-4 rounded-2xl text-sm lg:text-base leading-relaxed font-medium shadow-sm">
                    ¡Hola Lince! Escribe el <strong>número</strong> o <strong>nombre</strong> de la opción que necesites:<br><br>
                    <div class="flex flex-col gap-2 mt-2">
                        <span class="flex items-center gap-2">💰 <strong>1. Pagos</strong></span>
                        <span class="flex items-center gap-2">🎓 <strong>2. Becas</strong></span>
                        <span class="flex items-center gap-2">🗓️ <strong>3. Horario</strong></span>
                        <span class="flex items-center gap-2">🚗 <strong>4. Trámites</strong></span>
                        <span class="flex items-center gap-2">📞 <strong>5. Contacto CAE</strong></span>
                        <span class="flex items-center gap-2">🧠 <strong>6. Tips Exámenes</strong></span>
                        <span class="flex items-center gap-2">⏳ <strong>7. Tiempo</strong></span>
                    </div>
                </div>
            </div>

            <!-- Área de Entrada -->
            <footer class="p-4 border-t shrink-0" style="border-color: var(--border-color); background-color: var(--card-bg);">
                <div class="flex gap-3">
                    <input 
                        type="text" 
                        id="chat-input" 
                        class="chat-input flex-1 rounded-full px-5 py-3 text-sm lg:text-base"
                        placeholder="Escribe tu duda aquí..."
                        autocomplete="off"
                    >
                    <button 
                        onclick="sendMsg()" 
                        class="h-12 w-12 rounded-full flex items-center justify-center shrink-0 hover:scale-105 transition-transform shadow-md bg-[var(--uvmRed)] text-white"
                    >
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </footer>
        </div>
    </main>

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle');
            body.classList.toggle('light-mode');
            btn.innerHTML = body.classList.contains('light-mode') ? '☀️' : '🌙';
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim().toLowerCase();
            if(!text) return;

            addMsg(input.value, 'user');
            input.value = '';
            const typingId = showTypingIndicator();

            setTimeout(() => {
                removeTypingIndicator(typingId);
                let response = "No te entendí bien, Lince. Escribe un número del <strong>1 al 7</strong> o el tema de tu interés.";
                
                if(text === '1' || text.includes('pago')) {
                    response = "Puedes pagar en ventanilla o App Conexión Lince. Dudas: <br>📞 Ext. 23634, 23635 <br>📧 administracion.gdl@uvmnet.edu";
                } else if(text === '2' || text.includes('beca')) {
                    response = "Mantén promedio mín. 9.0 y 0 reprobadas. <br>📞 Ext. 23715 y 23755";
                } else if(text === '3' || text.includes('horario')) {
                    response = "Consulta a tu Coordinador Académico. Los cambios son las primeras semanas.";
                } else if(text === '4' || text.includes('tramite')) {
                    response = "Credencial/Tarjetón: Ve a CAE con tu ID oficial y datos del auto.";
                } else if(text === '5' || text.includes('cae')) {
                    response = "Contacto CAE: <br>📞 Ext. 23500 <br>📧 cae.guadalajarasur@uvmnet.edu";
                } else if(text === '6' || text.includes('examen')) {
                    response = "<strong>🧠 Tips:</strong><br>• Usa Técnica Pomodoro (25/5).<br>• Explica el tema a alguien más.<br>• Duerme 8 horas antes del examen.";
                } else if(text === '7' || text.includes('tiempo')) {
                    response = "<strong>⏳ Organización:</strong><br>• Google Calendar es tu mejor amigo.<br>• Prioriza con la Matriz de Eisenhower.<br>• Aprovecha las horas muertas en biblioteca.";
                }
                
                addMsg(response, 'bot');
            }, 800);
        }

        function addMsg(text, sender) {
            const chatWindow = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const baseClasses = "msg max-w-[85%] lg:max-w-[75%] p-4 rounded-2xl text-sm font-medium shadow-sm flex flex-col";
            div.className = sender === 'user' ? `${baseClasses} msg-user self-end` : `${baseClasses} msg-bot self-start`;
            div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTypingIndicator() {
            const chatWindow = document.getElementById('chat-messages');
            const div = document.createElement('div');
            const id = 'typing-' + Date.now();
            div.id = id;
            div.className = "msg msg-bot self-start p-4 rounded-2xl text-sm font-medium shadow-sm flex items-center gap-1";
            div.innerHTML = `<div class="w-2 h-2 rounded-full bg-current animate-bounce"></div><div class="w-2 h-2 rounded-full bg-current animate-bounce" style="animation-delay: 0.1s"></div><div class="w-2 h-2 rounded-full bg-current animate-bounce" style="animation-delay: 0.2s"></div>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });
    </script>
</body>
</html>
